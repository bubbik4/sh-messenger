server {
    listen 80;
    server_name localhost;

    # Obsługa plików statycznych wygenerowanych przez Flutter Web
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Dodanie nagłówków zapobiegających cache'owaniu
        location ~* \.(html|js|json)$ {
            root   /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }
    }

    # Proxy dla zapytań REST API (logowanie, rejestracja)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy dla WebSocketów wysyłane do kontenera z backendem Go
    location /ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        # Wydłużone timeouty dla połączeń WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
