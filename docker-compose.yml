version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: e2e_messenger_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-messenger_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: e2e_messenger_backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB:-messenger_db}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
      - PORT=8080
      - GOOGLE_APPLICATION_CREDENTIALS=/app/serviceAccountKey.json
    volumes:
      - ./secrets/serviceAccountKey.json:/app/serviceAccountKey.json:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: e2e_messenger_frontend
    restart: unless-stopped
    ports:
      - "8089:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: e2e_messenger_db_data
