version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: e2e_messenger_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: messenger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: e2e_messenger_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=secure_password_123
      - DB_NAME=messenger_db
      - PORT=8080
    ports:
      - "8089:8080"

volumes:
  postgres_data:
    name: e2e_messenger_db_data
